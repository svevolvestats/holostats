  <!-- Domain migration: carry localStorage from svestats.pages.dev → svestats.cc. See MIGRATION_PLAN.md. Runs before gtag so throwaway redirect hops don't fire page_view. -->
  <script>(function(){
    var H=location.hostname;
    var CC='https://svestats.cc', OLD='https://svestats.pages.dev';
    var KEYS=['sve-theme','sve-favorites','sve-decks','sve-decks-autosave','sve-sort','sve-order','holo-theme'];
    var BOT=/bot|crawl|spider|slurp|googlebot|bingpreview|yandex|baidu|duckduck|facebookexternalhit|twitterbot|linkedin|line\/|discord|telegram|whatsapp|embedly|pinterest/i.test(navigator.userAgent);
    function canon(){var h=location.hash;return h.indexOf('#/')===0?h.slice(1):location.pathname+location.search;}

    if(H==='svestats.pages.dev'){
      var qs=new URLSearchParams(location.search), isExport=qs.get('export')==='1', path;
      if(isExport){qs.delete('export');var s=qs.toString();path=location.pathname+(s?('?'+s):'');}
      else{path=canon();}
      if(BOT){location.replace(CC+path);return;}
      var data={},has=false;
      try{for(var i=0;i<KEYS.length;i++){var v=localStorage.getItem(KEYS[i]);if(v!==null){data[KEYS[i]]=v;has=true;}}}catch(e){}
      var exported=false;try{exported=!!localStorage.getItem('sve-exported');}catch(e){}
      // In export mode (.cc explicitly asked), always POST — even an empty payload —
      // so .cc records sve-migrated and stops bouncing. Only skip for organic visits.
      if(!isExport&&(!has||exported)){location.replace(CC+path);return;}
      var b64='';
      try{var bytes=new TextEncoder().encode(JSON.stringify(data)),bin='';for(var j=0;j<bytes.length;j++)bin+=String.fromCharCode(bytes[j]);b64=btoa(bin);}
      catch(e){location.replace(CC+path);return;}
      try{localStorage.setItem('sve-exported',new Date().toISOString());}catch(e){}
      var f=document.createElement('form');f.method='POST';f.action=CC+'/migrate';
      function add(n,val){var x=document.createElement('input');x.type='hidden';x.name=n;x.value=val;f.appendChild(x);}
      add('p',b64);add('path',path);
      (document.body||document.documentElement).appendChild(f);f.submit();
      return;
    }

    if(H==='svestats.cc'){
      if(BOT)return;
      // Storage-independent loop guard (key for in-app browsers like X/Twitter that drop
      // localStorage/sessionStorage across navigations): if we just came back from the old
      // domain or the /migrate handler, migration already ran/attempted — never bounce again.
      try{var ref=document.referrer||'';if(ref.indexOf('//svestats.pages.dev')!==-1||ref.indexOf('//svestats.cc/migrate')!==-1)return;}catch(e){}
      var migrated=false;try{migrated=!!localStorage.getItem('sve-migrated');}catch(e){}
      if(migrated)return;
      var canWrite=false;try{localStorage.setItem('sve-wtest','1');localStorage.removeItem('sve-wtest');canWrite=true;}catch(e){}
      if(!canWrite)return;
      // Loop guard: bounce at most once per tab session. If we return still unmigrated
      // (migrate fn missing, empty data, write blocked), do NOT bounce again — render as-is.
      var bounced=false;try{bounced=!!sessionStorage.getItem('sve-bounced');sessionStorage.setItem('sve-bounced','1');}catch(e){}
      if(bounced)return;
      var p=canon();location.replace(OLD+p+(p.indexOf('?')===-1?'?':'&')+'export=1');
      return;
    }
  })();</script>
